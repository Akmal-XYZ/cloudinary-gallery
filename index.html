<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Project Panel</title>

<style>
body { margin:0; background:#0f0f0f; font-family:sans-serif; color:#fff; }
.container { padding:15px; }

.project {
  background:#1a1a1a;
  padding:15px;
  border-radius:14px;
  margin-bottom:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.status span {
  margin-left:6px;
  font-size:12px;
  padding:4px 6px;
  border-radius:6px;
  background:#222;
}

.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}
.overlay.active { display:flex; }

.overlay-header {
  padding:15px;
  background:#111;
  display:flex;
  justify-content:space-between;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  padding:10px;
  overflow:auto;
}

img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

textarea {
  width:100%;
  height:80px;
  border:none;
  border-radius:8px;
  padding:8px;
  background:#1a1a1a;
  color:#fff;
}

audio { width:100%; margin-top:10px; }

button {
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container" id="projects">Loading...</div>

<div class="overlay" id="overlay">
  <div class="overlay-header">
    <span id="overlayTitle"></span>
    <button onclick="closeOverlay()">Close</button>
  </div>

  <!-- NOTE -->
  <div style="padding:10px">
    <textarea id="noteInput"></textarea>
    <button onclick="saveNote()">Save Note</button>
    <div id="savedNote" style="display:none;"></div>
  </div>

  <!-- AUDIO -->
  <div style="padding:10px">
    <input type="file" id="audioInput" accept="audio/mp3">
    <audio id="audioPlayer" controls style="display:none;"></audio>
    <button onclick="uploadAudio()">Upload Audio</button>
  </div>

  <div class="gallery" id="gallery"></div>
</div>

<script>
const CLOUD_NAME = "dzbpzdqao";
const AUDIO_PRESET = "audio_upload";

let currentUser = "";
let allResources = [];

// username extract
function extractUsername(name) {
  const match = name.match(/BY_(@[A-Za-z0-9_]+)/i);
  return match ? match[1].toLowerCase() : "unknown";
}

// LOAD DATA
async function loadData() {
  const res = await fetch("/api/cloudinary");
  const data = await res.json();

  allResources = data.resources;

  const grouped = {};

  data.resources.forEach(file => {
    if (file.resource_type === "image") {
      const user = extractUsername(file.public_id);
      if (!grouped[user]) grouped[user] = [];
      grouped[user].push(file);
    }
  });

  const container = document.getElementById("projects");
  container.innerHTML = "";

  Object.keys(grouped).forEach(user => {

    const hasNote = allResources.find(f => f.public_id === `note_BY_${user}`);
    const hasAudio = allResources.find(f => f.public_id === `audio_BY_${user}`);
    const hasFoto = grouped[user].length > 0;

    const div = document.createElement("div");
    div.className = "project";

    div.innerHTML = `
      <span>${user}</span>
      <div class="status">
        <span>NOTE ${hasNote ? "✅" : "❌"}</span>
        <span>AUDIO ${hasAudio ? "✅" : "❌"}</span>
        <span>FOTO ${hasFoto ? "✅" : "❌"}</span>
      </div>
    `;

    div.onclick = () => openProject(user, grouped[user]);
    container.appendChild(div);
  });
}

loadData();

// OPEN PROJECT
function openProject(user, files) {
  currentUser = user;

  document.getElementById("overlayTitle").innerText = user;
  document.getElementById("gallery").innerHTML = "";

  files.forEach(f => {
    const img = document.createElement("img");
    img.src = f.secure_url;
    gallery.appendChild(img);
  });

  loadNote();
  loadAudio();

  document.getElementById("overlay").classList.add("active");
}

// NOTE
async function loadNote() {
  const file = allResources.find(f => f.public_id === `note_BY_${currentUser}`);

  if (file) {
    const text = await fetch(file.secure_url).then(r => r.text());
    noteInput.style.display = "none";
    savedNote.style.display = "block";
    savedNote.innerText = text;
  }
}

async function saveNote() {
  const text = noteInput.value;

  await fetch("/api/uploadNote", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ user: currentUser, text })
  });

  alert("Note saved");
  location.reload();
}

// AUDIO PREVIEW
audioInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  audioPlayer.src = URL.createObjectURL(file);
  audioPlayer.style.display = "block";
});

// 🔥 UPLOAD AUDIO LANGSUNG CLOUDINARY
async function uploadAudio() {
  const file = audioInput.files[0];
  if (!file) return alert("Pilih audio");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", AUDIO_PRESET);
  formData.append("public_id", `audio_BY_${currentUser}`);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,
    {
      method:"POST",
      body: formData
    }
  );

  const data = await res.json();

  if (data.error) {
    alert("Upload gagal");
    console.log(data);
    return;
  }

  alert("Audio uploaded ✅");

  // langsung update UI tanpa reload
  audioPlayer.src = data.secure_url;
  audioPlayer.style.display = "block";

  // update memory biar status langsung berubah
  allResources.push({
    public_id: `audio_BY_${currentUser}`,
    secure_url: data.secure_url
  });

  loadData();
}

// LOAD AUDIO
function loadAudio() {
  const file = allResources.find(f => f.public_id === `audio_BY_${currentUser}`);

  if (file) {
    audioPlayer.src = file.secure_url;
    audioPlayer.style.display = "block";
  }
}

// CLOSE
function closeOverlay() {
  overlay.classList.remove("active");
}
</script>

</body>
</html>
