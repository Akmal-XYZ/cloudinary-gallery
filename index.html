<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Project Panel</title>

<style>
body {
  margin:0;
  background:#111;
  font-family:sans-serif;
  color:#fff;
}

.container {
  padding:15px;
}

.project {
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
  transition:0.2s;
}

.project:hover {
  background:#222;
  transform:scale(1.02);
}

.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  flex-direction:column;
  opacity:0;
  transition:0.3s;
}

.overlay.active {
  display:flex;
  opacity:1;
}

.overlay-header {
  padding:15px;
  background:#000;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.close-btn {
  background:red;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  padding:10px;
  overflow:auto;
}

img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

/* NOTE UI */
.note-box {
  padding:10px;
}

textarea {
  width:100%;
  height:100px;
  border-radius:8px;
  border:none;
  padding:10px;
  font-size:16px;
}

button.save {
  width:100%;
  margin-top:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00aa55;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="projects">Loading...</div>

<div class="overlay" id="overlay">
  <div class="overlay-header">
    <span id="overlayTitle"></span>
    <button class="close-btn" onclick="closeOverlay()">Close</button>
  </div>

  <!-- NOTE -->
  <div class="note-box">
    <textarea id="noteInput" placeholder="Tulis note..."></textarea>
    <button class="save" id="saveBtn" onclick="saveNote()">Save Note</button>
  </div>

  <div class="gallery" id="gallery"></div>
</div>

<script>
let currentUser = "";
let noteSaved = false;

function extractUsername(name) {
  const match = name.match(/BY_(@[A-Za-z0-9_]+)/i);
  return match ? match[1].toLowerCase() : "unknown";
}

// LOAD PROJECT
fetch("/api/cloudinary")
.then(res => res.json())
.then(data => {
  const grouped = {};

  data.resources.forEach(file => {
    if (!file.public_id.includes("note_BY_")) {
      const user = extractUsername(file.public_id || "");
      if (!grouped[user]) grouped[user] = [];
      grouped[user].push(file.secure_url);
    }
  });

  const container = document.getElementById("projects");
  container.innerHTML = "";

  if (Object.keys(grouped).length === 0) {
    container.innerHTML = "No project found";
    return;
  }

  Object.keys(grouped).forEach(user => {
    const div = document.createElement("div");
    div.className = "project";
    div.innerText = "Project By " + user;

    div.onclick = () => openProject(user, grouped[user]);

    container.appendChild(div);
  });
});

// OPEN PROJECT
function openProject(user, images) {
  currentUser = user;
  noteSaved = false;

  const overlay = document.getElementById("overlay");
  const gallery = document.getElementById("gallery");
  const title = document.getElementById("overlayTitle");
  const input = document.getElementById("noteInput");
  const saveBtn = document.getElementById("saveBtn");

  gallery.innerHTML = "";
  title.innerText = "Project By " + user;

  input.value = "";
  input.disabled = false;
  saveBtn.disabled = false;

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    gallery.appendChild(img);
  });

  loadNote(user);

  overlay.classList.add("active");
}

// LOAD NOTE FROM CLOUDINARY
async function loadNote(user) {
  try {
    const res = await fetch("/api/cloudinary");
    const data = await res.json();

    const file = data.resources.find(f =>
      f.public_id === `note_BY_${user}`
    );

    if (file) {
      const txt = await fetch(file.secure_url).then(r => r.text());

      document.getElementById("noteInput").value = txt;
      document.getElementById("noteInput").disabled = true;
      document.getElementById("saveBtn").disabled = true;

      noteSaved = true;
    }
  } catch (err) {
    console.log("load note error", err);
  }
}

// SAVE NOTE
async function saveNote() {
  if (noteSaved) return;

  const text = document.getElementById("noteInput").value.trim();
  if (!text) return alert("Note kosong");

  await fetch("/api/uploadNote", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      user: currentUser,
      text,
    }),
  });

  document.getElementById("noteInput").disabled = true;
  document.getElementById("saveBtn").disabled = true;

  noteSaved = true;
}

// CLOSE
function closeOverlay() {
  document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
