<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Project Panel</title>

<style>
body { margin:0; background:#0f0f0f; font-family:sans-serif; color:#fff; }

.container { padding:15px; }

.project {
  background:#1a1a1a;
  padding:15px;
  border-radius:14px;
  margin-bottom:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.project:hover { background:#222; }

.status span {
  margin-left:6px;
  font-size:12px;
  padding:4px 6px;
  border-radius:6px;
  background:#222;
}

/* overlay */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}

.overlay.active { display:flex; }

.overlay-header {
  padding:15px;
  background:#111;
  display:flex;
  justify-content:space-between;
}

.close-btn {
  background:red;
  border:none;
  color:#fff;
  padding:6px 10px;
}

/* note */
.note-box { padding:10px; border-bottom:1px solid #222; }

textarea {
  width:100%;
  height:80px;
  border:none;
  border-radius:8px;
  padding:8px;
  background:#1a1a1a;
  color:#fff;
}

button {
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* audio */
.audio-box { padding:10px; border-bottom:1px solid #222; }

audio { width:100%; margin-top:5px; }

/* gallery */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  padding:10px;
  overflow:auto;
}

img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container" id="projects">Loading...</div>

<div class="overlay" id="overlay">
  <div class="overlay-header">
    <span id="overlayTitle"></span>
    <button class="close-btn" onclick="closeOverlay()">Close</button>
  </div>

  <!-- NOTE -->
  <div class="note-box">
    <textarea id="noteInput" placeholder="Tulis note..."></textarea>
    <button onclick="saveNote()">Save Note</button>
    <div id="savedNote" style="display:none;"></div>
  </div>

  <!-- AUDIO -->
  <div class="audio-box">
    <input type="file" id="audioInput" accept="audio/*">
    <audio id="audioPreview" controls style="display:none;"></audio>
    <button onclick="saveAudio()">Save Audio</button>
  </div>

  <div class="gallery" id="gallery"></div>
</div>

<script>
let currentUser = "";
let allResources = [];

// extract user
function extractUsername(name) {
  const match = name.match(/BY_(@[A-Za-z0-9_]+)/i);
  return match ? match[1].toLowerCase() : "unknown";
}

// LOAD DATA
fetch("/api/cloudinary")
.then(res => res.json())
.then(data => {
  allResources = data.resources;

  const grouped = {};

  data.resources.forEach(file => {
    if (file.resource_type === "image") {
      const user = extractUsername(file.public_id || "");
      if (!grouped[user]) grouped[user] = [];
      grouped[user].push(file);
    }
  });

  const container = document.getElementById("projects");
  container.innerHTML = "";

  Object.keys(grouped).forEach(user => {

    const hasNote = allResources.find(f => f.public_id === `note_BY_${user}.txt`);
    const hasAudio = allResources.find(f => f.public_id === `audio_BY_${user}.mp3`);
    const hasFoto = grouped[user].length > 0;

    const div = document.createElement("div");
    div.className = "project";

    div.innerHTML = `
      <span>Project By ${user}</span>
      <div class="status">
        <span>NOTE ${hasNote ? "✅" : "❌"}</span>
        <span>AUDIO ${hasAudio ? "✅" : "❌"}</span>
        <span>FOTO ${hasFoto ? "✅" : "❌"}</span>
      </div>
    `;

    div.onclick = () => openProject(user, grouped[user]);

    container.appendChild(div);
  });
});

// OPEN PROJECT
function openProject(user, files) {
  currentUser = user;

  document.getElementById("overlayTitle").innerText = "Project " + user;

  // reset
  document.getElementById("gallery").innerHTML = "";
  document.getElementById("noteInput").style.display = "block";
  document.getElementById("savedNote").style.display = "none";

  // images
  files.forEach(f => {
    const img = document.createElement("img");
    img.src = f.secure_url;
    document.getElementById("gallery").appendChild(img);
  });

  loadNote();
  loadAudio();

  document.getElementById("overlay").classList.add("active");
}

// LOAD NOTE
async function loadNote() {
  const file = allResources.find(f => f.public_id === `note_BY_${currentUser}.txt`);

  if (file) {
    const text = await fetch(file.secure_url).then(r => r.text());

    document.getElementById("noteInput").style.display = "none";
    const saved = document.getElementById("savedNote");
    saved.style.display = "block";
    saved.innerText = text;
  }
}

// SAVE NOTE
async function saveNote() {
  const text = document.getElementById("noteInput").value;

  await fetch("/api/uploadNote", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ user: currentUser, text })
  });

  location.reload();
}

// AUDIO PREVIEW
document.getElementById("audioInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  const audio = document.getElementById("audioPreview");
  audio.src = url;
  audio.style.display = "block";
});

// SAVE AUDIO
async function saveAudio() {
  const file = document.getElementById("audioInput").files[0];
  if (!file) return alert("Pilih audio dulu");

  const form = new FormData();
  form.append("file", file);
  form.append("user", currentUser);

  await fetch("/api/uploadAudio", {
    method:"POST",
    body: form
  });

  location.reload();
}

// LOAD AUDIO
function loadAudio() {
  const file = allResources.find(f => f.public_id === `audio_BY_${currentUser}.mp3`);

  if (file) {
    const audio = document.getElementById("audioPreview");
    audio.src = file.secure_url;
    audio.style.display = "block";
  }
}

// CLOSE
function closeOverlay() {
  document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
