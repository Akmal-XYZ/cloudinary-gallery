<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Project Panel</title>

<style>
body {
  margin:0;
  background:#0f0f0f;
  font-family:sans-serif;
  color:#fff;
}

/* PROJECT LIST */
.container {
  padding:15px;
}

.project {
  background:#1a1a1a;
  padding:15px;
  border-radius:14px;
  margin-bottom:10px;
  cursor:pointer;
  transition:0.2s;
}

.project:hover {
  background:#222;
  transform:scale(1.02);
}

/* OVERLAY */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}

.overlay.active {
  display:flex;
}

.overlay-header {
  padding:15px;
  background:#111;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #222;
}

.close-btn {
  background:#ff3b3b;
  border:none;
  color:#fff;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* NOTE */
.note-box {
  padding:12px;
  border-bottom:1px solid #222;
}

textarea {
  width:100%;
  height:100px;
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:15px;
  background:#1a1a1a;
  color:#fff;
}

.save-btn {
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c46a;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.saved-text {
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  white-space:pre-wrap;
  line-height:1.4;
}

/* GALLERY */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  padding:10px;
  overflow:auto;
}

img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container" id="projects">Loading...</div>

<div class="overlay" id="overlay">
  <div class="overlay-header">
    <span id="overlayTitle"></span>
    <button class="close-btn" onclick="closeOverlay()">Close</button>
  </div>

  <!-- NOTE AREA -->
  <div class="note-box" id="noteBox">
    <textarea id="noteInput" placeholder="Tulis note..."></textarea>
    <button class="save-btn" id="saveBtn" onclick="saveNote()">Save Note</button>

    <!-- hasil saved -->
    <div id="savedText" class="saved-text" style="display:none;"></div>
  </div>

  <div class="gallery" id="gallery"></div>
</div>

<script>
let currentUser = "";
let noteSaved = false;

function extractUsername(name) {
  const match = name.match(/BY_(@[A-Za-z0-9_]+)/i);
  return match ? match[1].toLowerCase() : "unknown";
}

// LOAD PROJECT
fetch("/api/cloudinary")
.then(res => res.json())
.then(data => {
  const grouped = {};

  data.resources.forEach(file => {
    if (!file.public_id.includes("note_BY_")) {
      const user = extractUsername(file.public_id || "");
      if (!grouped[user]) grouped[user] = [];
      grouped[user].push(file.secure_url);
    }
  });

  const container = document.getElementById("projects");
  container.innerHTML = "";

  Object.keys(grouped).forEach(user => {
    const div = document.createElement("div");
    div.className = "project";
    div.innerText = "Project By " + user;
    div.onclick = () => openProject(user, grouped[user]);
    container.appendChild(div);
  });
})
.catch(() => {
  document.getElementById("projects").innerText = "API ERROR";
});

// OPEN PROJECT
function openProject(user, images) {
  currentUser = user;
  noteSaved = false;

  const gallery = document.getElementById("gallery");
  const title = document.getElementById("overlayTitle");

  gallery.innerHTML = "";
  title.innerText = "Project By " + user;

  // reset UI
  document.getElementById("noteInput").style.display = "block";
  document.getElementById("saveBtn").style.display = "block";
  document.getElementById("savedText").style.display = "none";

  document.getElementById("noteInput").value = "";

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    gallery.appendChild(img);
  });

  loadNote(user);

  document.getElementById("overlay").classList.add("active");
}

// LOAD NOTE
async function loadNote(user) {
  try {
    const res = await fetch("/api/cloudinary");
    const data = await res.json();

    const file = data.resources.find(f =>
      f.public_id === `note_BY_${user}.txt`
    );

    if (file) {
      const text = await fetch(file.secure_url).then(r => r.text());

      document.getElementById("noteInput").style.display = "none";
      document.getElementById("saveBtn").style.display = "none";

      const saved = document.getElementById("savedText");
      saved.style.display = "block";
      saved.innerText = text;

      noteSaved = true;
    }
  } catch (err) {
    console.log(err);
  }
}

// SAVE NOTE
async function saveNote() {
  if (noteSaved) return;

  const text = document.getElementById("noteInput").value.trim();
  if (!text) return alert("Note kosong");

  document.getElementById("saveBtn").innerText = "Saving...";

  await fetch("/api/uploadNote", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      user: currentUser,
      text,
    }),
  });

  // tampilkan hasil langsung
  document.getElementById("noteInput").style.display = "none";
  document.getElementById("saveBtn").style.display = "none";

  const saved = document.getElementById("savedText");
  saved.style.display = "block";
  saved.innerText = text;

  noteSaved = true;
}

// CLOSE
function closeOverlay() {
  document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
